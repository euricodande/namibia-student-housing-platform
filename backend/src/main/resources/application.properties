spring.application.name=housing
server.port=8081

server.servlet.context-path=/api

spring.datasource.url=jdbc:postgresql://localhost:5433/namibia_housing_db
spring.datasource.username=housing_user
spring.datasource.password=housing_password

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:dev-secret-key-change-this-later-dev-secret-key-123456}
app.jwt.expiration-ms=86400000